<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agracta</title>
<link rel="stylesheet" href="styles.css?v=8">
<script>try{if(localStorage.getItem('agracta-theme')!=='dark'){document.documentElement.classList.add('light');}else{document.addEventListener('DOMContentLoaded',function(){var m=document.querySelector('meta[name="theme-color"]');if(m)m.content='#101513';});}}catch(e){document.documentElement.classList.add('light');}</script>
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap">
<meta name="theme-color" content="#f2f3f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Agracta">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js?v=56').catch(function(){});});}</script>
</head>
<body>
<div class="top-bar">
<div class="tb-brand"></div>
<div class="top-bar-right">
<span class="top-bar-info" id="dateInfo"></span>
<button class="btn-sm" id="btnAgenda" onclick="toggleAgenda()">AGENDA <span id="agendaBadge"></span></button>
</div>
</div>
<div class="agenda-panel" id="agendaPanel"></div>
<div class="map-container">
<div id="map"></div>
<div class="map-inner" id="mapInner" style="display:none">
<img src="mapa-base.jpg" id="mapImg" onload="if(window.init)init()">
<svg id="svgO" viewBox="0 0 1280 889" preserveAspectRatio="xMidYMid meet">
<defs>
<filter id="sh"><feDropShadow dx="0" dy="0.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.9"/></filter>
<filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fff" flood-opacity="0.3"/></filter>
</defs>
</svg>
</div>
</div>
<div class="overlay" id="dOvl" onclick="closeDetail()"><div class="panel" id="dPnl" onclick="event.stopPropagation()"></div></div>
<div class="overlay" id="eOvl" onclick="closeEdit()"><div class="edit-panel" id="ePnl" onclick="event.stopPropagation()"></div></div>
<div class="overlay" id="sOvl" onclick="closeStudyEdit()"><div class="edit-panel" id="sPnl" onclick="event.stopPropagation()"></div></div>
<div class="overlay" id="noteOvl" onclick="closeNoteModal()"><div class="edit-panel" id="notePnl" onclick="event.stopPropagation()"></div></div>

<div id="scoutingBanner" style="position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--surface, rgba(20,30,20,0.96));border:1px solid var(--accent, #37d684);border-radius:999px;padding:7px 8px 7px 16px;box-shadow:var(--shadow, 0 6px 20px rgba(0,0,0,0.5));display:none;align-items:center;gap:10px;font:600 12px system-ui,sans-serif;color:var(--text, #fff);max-width:94vw;white-space:nowrap;">
  <span style="overflow:hidden;text-overflow:ellipsis;">Toque no mapa onde está a observação</span>
  <button onclick="scoutingUseGPS()" style="background:var(--accent-soft, #1e3a1e);color:var(--accent, #8c8);border:1px solid var(--accent, #3a5a3a);padding:5px 11px;border-radius:999px;cursor:pointer;font-weight:700;">GPS</button>
  <button onclick="toggleScoutingMode(false)" aria-label="Sair do modo observação" title="Sair" style="background:rgba(215,90,78,.14);color:var(--danger, #f88);border:1px solid var(--danger, #5a3a3a);width:28px;height:28px;border-radius:50%;cursor:pointer;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">✕</button>
</div>

<!-- NOVOS PAINÉIS v2 -->
<div class="sd-overlay" id="sdOvl"><div id="sdPnl"></div></div>
<div class="se-overlay" id="seOvl" onclick="if(event.target.id==='seOvl')closeStudyEditV2()"><div class="se-panel" id="sePnl" onclick="event.stopPropagation()"></div></div>
<div class="se-overlay" id="eeOvl" onclick="if(event.target.id==='eeOvl')closeEventEdit()"><div class="se-panel" id="eePnl" onclick="event.stopPropagation()"></div></div>
<div id="rubricaOvl" style="display:none;position:fixed;inset:0;z-index:5000;background:#fff;flex-direction:column">
  <div style="padding:11px 16px;display:flex;justify-content:space-between;align-items:center;background:#eef2ee;border-bottom:1px solid #d7e0d7">
    <span style="font:700 14px system-ui,sans-serif;color:#1f3326">Rubrica do avaliador</span>
    <span id="rubricaInfo" style="font:500 12px system-ui,sans-serif;color:#7a8a7e"></span>
  </div>
  <div style="flex:1;position:relative;min-height:0;background:#fff">
    <canvas id="rubricaCanvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;background:#fff;touch-action:none;cursor:crosshair"></canvas>
  </div>
  <div style="padding:10px 14px;display:flex;gap:10px;background:#eef2ee;border-top:1px solid #d7e0d7;padding-bottom:calc(10px + env(safe-area-inset-bottom))">
    <button type="button" onclick="rubricaClear()" style="padding:12px 16px;border:1px solid #c2cdc2;background:#fff;color:#33443a;border-radius:10px;font:700 13px system-ui;cursor:pointer">Limpar</button>
    <button type="button" onclick="rubricaSkip()" style="padding:12px 16px;border:1px solid #c2cdc2;background:#fff;color:#7a8a7e;border-radius:10px;font:700 13px system-ui;cursor:pointer">Pular</button>
    <button type="button" onclick="rubricaConfirm()" style="flex:1;padding:12px 16px;border:0;background:#1f7a3a;color:#fff;border-radius:10px;font:800 13px system-ui;cursor:pointer">✓ Confirmar rubrica</button>
  </div>
</div>

<!-- Ferramentas do mapa: agrupadas num botão só (FAB) — mapa limpo por padrão -->
<div class="toolbar-extra" id="toolDock">
<button class="tool-ndvi tool-item" onclick="toggleToolDock(false);toggleNdvi()" title="Camadas NDVI / NDRE / GNDVI (Sentinel-2)" aria-label="NDVI"><span class="tool-ico"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a7.31 7.31 0 0 0 10 10Z"/><path d="m9 15 3-3"/><path d="M17 13a6 6 0 0 0-6-6"/><path d="M21 13A10 10 0 0 0 11 3"/></svg></span></button>
<button class="tool-clima tool-item" onclick="toggleToolDock(false);toggleClima()" title="Clima ao vivo da estação meteorológica (Ecowitt)" aria-label="Clima"><span class="tool-ico"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="M20 12h2"/><path d="m17.7 6.3 1.4-1.4"/><path d="M16 12a4 4 0 1 0-8 0"/><path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z"/></svg></span></button>
<button class="tool-measure tool-item" onclick="toggleToolDock(false);toggleMeasure()" title="Medir área no mapa ou com o GPS" aria-label="Medir"><span class="tool-ico"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.3 8.7 8.7 21.3a1 1 0 0 1-1.4 0l-4.6-4.6a1 1 0 0 1 0-1.4L15.3 2.7a1 1 0 0 1 1.4 0l4.6 4.6a1 1 0 0 1 0 1.4Z"/><path d="m7.5 10.5 2 2"/><path d="m10.5 7.5 2 2"/><path d="m13.5 4.5 2 2"/><path d="m4.5 13.5 2 2"/></svg></span></button>
<button class="tool-note tool-item" onclick="toggleToolDock(false);toggleScoutingMode()" title="Registrar Observação (Nota de Campo)" aria-label="Observação"><span class="tool-ico"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></span></button>
<button class="tool-gps tool-item" onclick="toggleToolDock(false);locateMe()" title="Mostrar minha localização (GPS)" aria-label="GPS"><span class="tool-ico"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="2" x2="5" y1="12" y2="12"/><line x1="19" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="5"/><line x1="12" x2="12" y1="19" y2="22"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/></svg></span></button>
<button class="tool-fab" onclick="toggleToolDock()" title="Ferramentas do mapa" aria-label="Ferramentas do mapa" aria-expanded="false"><span class="tool-ico fab-open"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span><span class="tool-ico fab-close" style="display:none"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></button>
<input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
</div>

<!-- Painel Hoje -->
<div class="today-overlay" id="todayOvl"><div id="todayPnl"></div></div>

<!-- Busca -->
<div class="search-overlay" id="searchOvl" onclick="if(event.target.id==='searchOvl')closeSearch()">
<div class="search-wrap">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Buscar quadra, cultura, cultivar ou estudo..." oninput="onSearchInput()" onkeydown="if(event.key==='Escape')closeSearch()">
<button class="search-close" onclick="closeSearch()">✕</button>
</div>
<div id="searchResults"></div>
</div>
</div>

<script src="vendor/leaflet.js"></script>
<script src="vendor/leaflet-rotate.js"></script>
<script src="vendor/Leaflet.ImageOverlay.Rotated.js"></script>
<script src="vendor/quadras-default.js"></script>
<script src="vendor/biocalc-campo-core.js"></script>
<script src="vendor/xlsx.full.min.js"></script>
<script src="vendor/supabase.js"></script>
<script>window.LF=window.L;/* Leaflet alias: o app reusa 'L' para rótulos */</script>
<script src="app.js?v=4"></script>
<script src="vendor/firebase-app-compat.js"></script>
<script src="vendor/firebase-auth-compat.js"></script>
<script src="vendor/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="firebase-sync.js"></script>
</body>
</html>
